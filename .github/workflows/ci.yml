name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm test

      - name: Build
        env:
          DATABASE_URL: "file:./dev.db"
          AUTH_SECRET: "ci-test-secret-must-be-32-characters-long"
        run: npm run build
